<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박수찬 | 사업 PM</title>

<link rel="stylesheet" href="./style.css?v=1.6">
<script src="./script.js?v=1.6" defer></script>
</head>

<body>

<div class="card">

    <div class="profile">
        <div class="profile-image">
            <img src="./machoman.jpg" alt="박수찬 프로필">
        </div>

        <h1 class="name">박수찬</h1>
        <div class="job">사업 PM</div>

        <p class="intro">
            원활한 커뮤니케이션과 빠른 실행력으로 게임의 트렌드를 이끕니다.
        </p>

        <div class="skills">
            <div class="skill-item">
                <div class="skill-icon">🎯</div>
                <div class="skill-text">Game Analysis</div>
            </div>

            <div class="skill-item">
                <div class="skill-icon">📊</div>
                <div class="skill-text">Data Driven</div>
            </div>

            <div class="skill-item">
                <div class="skill-icon">🤖</div>
                <div class="skill-text">AI Utilization</div>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="info-item">
            <div class="label">EMAIL</div>
            <div class="value">
                <a id="emailText" href="mailto:psc9939@naver.com">psc9939@naver.com</a>
            </div>
        </div>

        <div class="info-item">
            <div class="label">PHONE</div>
            <div class="value">
                <a id="phoneText" href="tel:01012345678">010-1234-5678</a>
            </div>
        </div>
    </div>

    <div class="button-group">
        <button id="portfolioBtn" class="action-btn" type="button">
            📁 포트폴리오 바로가기
        </button>

        <button id="copyEmailBtn" class="action-btn" type="button">
            ✉️ 이메일 보내기
        </button>

        <button id="copyPhoneBtn" class="action-btn" type="button">
            📞 전화걸기
        </button>

        <button id="githubBtn" class="action-btn" type="button">
            💻 Github 보기
        </button>

    </div>

    <div class="footer">
        Business PM Portfolio Card
    </div>

</div>

</body>
</html>
