<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박수찬 | 사업 PM</title>

<link rel="stylesheet" href="./style.css?v=1.3">
<script src="./script.js?v=1.3" defer></script>
</head>

<body>

<div class="card">

    <div class="profile">
        <div class="profile-image">
            <img src="./dog1.jpg" alt="박수찬 프로필">
        </div>

        <h1 class="name">박수찬</h1>
        <div class="job">사업 PM</div>
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="info-item">
            <div class="label">EMAIL</div>
            <div class="value">
                <a id="emailText" href="mailto:park@example.com">park@example.com</a>
            </div>
        </div>

        <div class="info-item">
            <div class="label">PHONE</div>
            <div class="value">
                <a id="phoneText" href="tel:01012345678">010-1234-5678</a>
            </div>
        </div>
    </div>

    <div class="button-group">
        <button id="copyEmailBtn" class="action-btn" type="button">
            ✉️ 이메일 보내기
        </button>

        <button id="copyPhoneBtn" class="action-btn" type="button">
            📞 전화걸기
        </button>

        <button id="githubBtn" class="action-btn" type="button">
            💻 Github 바로가기
        </button>
    </div>

    <div class="footer">
        Business PM Portfolio Card
    </div>

</div>

</body>
</html>
